name: Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @ganatrack/web typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @ganatrack/web lint

  test:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm --filter @ganatrack/web test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 30

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ganatrack/web exec playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm --filter @ganatrack/web test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  lighthouse-desktop:
    name: Lighthouse Desktop
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm --filter @ganatrack/web build
        env:
          NEXT_PUBLIC_MSW_ENABLED: 'true'

      - name: Start server and run Lighthouse Desktop
        run: |
          pnpm --filter @ganatrack/web start &
          pnpm exec wait-on http://localhost:3000 --timeout 60000
          pnpm exec lhci autorun --config=.lighthouserc.desktop.json
        working-directory: apps/web
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          NEXT_PUBLIC_MSW_ENABLED: 'true'

      - name: Upload Lighthouse Desktop report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-desktop-report
          path: apps/web/.lighthouseci/desktop/
          retention-days: 30

  lighthouse-mobile:
    name: Lighthouse Mobile
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm --filter @ganatrack/web build
        env:
          NEXT_PUBLIC_MSW_ENABLED: 'true'

      - name: Start server and run Lighthouse Mobile
        run: |
          pnpm --filter @ganatrack/web start &
          pnpm exec wait-on http://localhost:3000 --timeout 60000
          pnpm exec lhci autorun --config=.lighthouserc.mobile.json
        working-directory: apps/web
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          NEXT_PUBLIC_MSW_ENABLED: 'true'

      - name: Upload Lighthouse Mobile report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-mobile-report
          path: apps/web/.lighthouseci/mobile/
          retention-days: 30

  badges:
    name: Generate Quality Badges
    runs-on: ubuntu-latest
    needs: [lighthouse-desktop, lighthouse-mobile]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: apps/web/coverage/

      - name: Download Lighthouse Desktop report
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-desktop-report
          path: apps/web/.lighthouseci/desktop/

      - name: Download Lighthouse Mobile report
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-mobile-report
          path: apps/web/.lighthouseci/mobile/

      - name: Generate badges
        run: pnpm --filter @ganatrack/web quality:badges
        env:
          GITHUB_SHA: ${{ github.sha }}

  a11y:
    name: Accessibility Audit (axe-core)
    runs-on: ubuntu-latest
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ganatrack/web exec playwright install --with-deps chromium

      - name: Run Playwright a11y tests
        run: pnpm --filter @ganatrack/web exec playwright test --project=chromium --grep-invert="@skip-ci"
        env:
          CI: true
