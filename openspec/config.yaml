# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Turborepo + pnpm monorepo, Fastify v5 (apps/api), React + Vite (apps/web),
  Drizzle ORM SQLite/PostgreSQL (packages/database), shared-types + Zod, TypeScript strict
  DI: tsyringe with reflect-metadata
  Architecture: Hexagonal (Ports & Adapters) backend, modular frontend
  Testing: Vitest (web + api), Playwright E2E (web)
  Style: ESLint 9, TypeScript strict + noUncheckedIndexedAccess, no formatter

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    rules:
      - Follow existing code patterns and conventions
      - Load relevant coding skills for the project stack
    tdd: true
    test_command: "pnpm --filter @ganatrack/web test"
  verify:
    test_command: "pnpm --filter @ganatrack/web test"
    build_command: "pnpm build"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd_mode: true
  detected: "2026-04-04"
  test_runner:
    command: "pnpm --filter @ganatrack/web test"
    framework: "Vitest v2"
  test_layers:
    unit:
      available: true
      tool: "Vitest + @testing-library/react (web)"
    integration:
      available: true
      tool: "@testing-library/react + msw (web)"
    e2e:
      available: true
      tool: "Playwright (Chromium + Firefox)"
  coverage:
    available: true
    command: "pnpm --filter @ganatrack/web test:coverage"
    details: "v8, 80% thresholds"
  quality_tools:
    linter:
      available: true
      command: "pnpm --filter @ganatrack/web lint (ESLint 9)"
    type_checker:
      available: true
      command: "pnpm typecheck (tsc --noEmit, strict)"
    formatter:
      available: false
      command: null
