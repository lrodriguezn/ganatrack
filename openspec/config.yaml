# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Turborepo + pnpm monorepo, Fastify v5 (apps/api), React + Vite (apps/web),
  Drizzle ORM SQLite/PostgreSQL (packages/database), shared-types + Zod, TypeScript strict
  DI: tsyringe with reflect-metadata
  Architecture: Hexagonal (Ports & Adapters) backend, modular frontend
  Testing: Vitest (web + api), Playwright E2E (web)
  Style: ESLint 9, TypeScript strict + noUncheckedIndexedAccess, no formatter

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
    tdd: false
    test_command: ""
  verify:
    test_command: "pnpm --filter @ganatrack/web test"
    build_command: "pnpm build"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  ## Testing Capabilities
  **Strict TDD Mode**: disabled
  **Detected**: 2026-04-04

  ### Test Runner
  - Command: `pnpm --filter @ganatrack/web test` (Vitest)
  - Framework: Vitest v2

  ### Test Layers
  | Layer | Available | Tool |
  |-------|-----------|------|
  | Unit | ✅ | Vitest + @testing-library/react (web) |
  | Integration | ✅ | @testing-library/react + msw (web) |
  | E2E | ✅ | Playwright (Chromium + Firefox) |

  ### Coverage
  - Available: ✅
  - Command: `pnpm --filter @ganatrack/web test:coverage` (v8, 80% thresholds)

  ### Quality Tools
  | Tool | Available | Command |
  |------|-----------|---------|
  | Linter | ✅ | `pnpm --filter @ganatrack/web lint` (ESLint 9) |
  | Type checker | ✅ | `pnpm typecheck` (tsc --noEmit, strict) |
  | Formatter | ❌ | — |
